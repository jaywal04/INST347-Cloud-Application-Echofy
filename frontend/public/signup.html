<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Echofy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <div id="navbar"></div>
  <script src="js/navbar.js"></script>

  <!-- SIGN-UP FORM -->
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join the community. Rate, review, and own your taste.</p>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="3-30 chars, letters, numbers, _" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required />
          <div class="password-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirmPassword" placeholder="Retype your password" autocomplete="new-password" required />
          <span class="field-hint" id="confirm-hint"></span>
        </div>

        <div class="form-group form-check">
          <label class="check-label">
            <input type="checkbox" id="accept-terms" name="acceptedTerms" required />
            <span>I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn-primary auth-submit" id="btn-signup">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login" class="auth-link">Sign in</a></p>
    </div>

    <!-- Email verification step (hidden by default) -->
    <div class="auth-card verify-card" id="verify-card" hidden>
      <h1 class="auth-title">Check your email</h1>
      <p class="auth-subtitle">We sent a 6-digit code to <strong id="verify-email-display"></strong></p>

      <div id="verify-error" class="auth-error" hidden></div>

      <form id="verify-form" novalidate>
        <div class="form-group">
          <label for="verify-code">Verification Code</label>
          <input type="text" id="verify-code" name="code" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" required />
        </div>

        <button type="submit" class="btn-primary auth-submit" id="btn-verify">Verify &amp; Create Account</button>
      </form>

      <p class="verify-timer" id="verify-timer">Code expires in <strong id="timer-countdown">3:00</strong></p>

      <div class="verify-actions">
        <button type="button" class="btn-ghost btn-sm" id="btn-resend-code" disabled>Resend Code</button>
        <button type="button" class="btn-ghost btn-sm" id="btn-back-signup">Back to Sign Up</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2026 Echofy — INST347 Group 5</span>
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">GitHub</a>
    </div>
  </footer>

  <script src="js/config.js"></script>

  <script src="js/auth.js" defer></script>
</body>
</html>
