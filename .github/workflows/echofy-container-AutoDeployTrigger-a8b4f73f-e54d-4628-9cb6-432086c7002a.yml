# Deploy API image to Azure Container Apps.
#
# GitHub secrets (repo → Settings → Secrets):
#   ECHOFYCONTAINER_AZURE_CLIENT_ID / TENANT_ID / SUBSCRIPTION_ID — OIDC (existing)
#   ECHOFYCONTAINER_ACR_NAME — Azure Container Registry short name only (e.g. myregistry), NOT the full URL
#
# The service principal for OIDC needs AcrPush (or equivalent) on the ACR and permission to update the Container App.
#
# Container App ingress "Target port" must be 8080 to match the Dockerfile.

name: Trigger auto deployment for echofy-container

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker/**'
      - '.github/workflows/echofy-container-AutoDeployTrigger-a8b4f73f-e54d-4628-9cb6-432086c7002a.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ECHOFYCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ECHOFYCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ECHOFYCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Verify ACR name secret
        env:
          ACR_NAME: ${{ secrets.ECHOFYCONTAINER_ACR_NAME }}
        run: |
          if [ -z "$ACR_NAME" ]; then
            echo "::error::Set GitHub secret ECHOFYCONTAINER_ACR_NAME to your Azure Container Registry name (short name only, e.g. myregistry)."
            exit 1
          fi

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          acrName: ${{ secrets.ECHOFYCONTAINER_ACR_NAME }}
          containerAppName: echofy-container
          resourceGroup: Echofy
          imageToBuild: ${{ secrets.ECHOFYCONTAINER_ACR_NAME }}.azurecr.io/echofy:${{ github.sha }}
          targetPort: 8080
