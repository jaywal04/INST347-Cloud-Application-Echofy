<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="/" />
  <title>Notifications — Echofy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <div id="navbar"></div>
  <script src="js/apiBase.js"></script>
  <script src="js/pathContext.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/bugReport.js"></script>
  <script src="js/chat.js" defer></script>

  <div class="profile-page notifications-page">
    <div class="profile-header">
      <div class="profile-header-info">
        <h1 class="profile-username">Notifications</h1>
        <p class="profile-meta">Friend requests and activity.</p>
      </div>
    </div>

    <section class="friends-section">
      <h2 class="friends-section-title">Friend requests</h2>
      <ul id="notif-requests" class="friends-list"></ul>
      <p id="notif-req-empty" class="friends-hint" hidden>No pending friend requests.</p>
    </section>

    <section class="friends-section">
      <h2 class="friends-section-title">Activity</h2>
      <ul id="notif-activity" class="friends-list notif-activity-list"></ul>
      <p id="notif-activity-empty" class="friends-hint">No activity yet. Follow someone or add friends to see their reviews here.</p>
    </section>
  </div>
  <footer>
    <span>&copy; 2026 Echofy — INST347 Group 5</span>
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">GitHub</a>
    </div>
  </footer>

  <script src="js/notifications.js" defer></script>
</body>
</html>
