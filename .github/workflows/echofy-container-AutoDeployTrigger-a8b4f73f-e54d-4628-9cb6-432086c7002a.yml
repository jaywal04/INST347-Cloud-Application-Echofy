# Deploy API image to Azure Container Apps.
#
# GitHub secrets — use ONE of these registry options:
#
# Option A (matches many Azure-generated workflows):
#   ECHOFYCONTAINER_REGISTRY_URL — login server only, e.g. myregistry.azurecr.io (no https://)
#   ECHOFYCONTAINER_REGISTRY_USERNAME
#   ECHOFYCONTAINER_REGISTRY_PASSWORD
#
# Option B (OIDC push to ACR, no registry password):
#   ECHOFYCONTAINER_ACR_NAME — short registry name only (e.g. myregistry)
#   Service principal needs AcrPush on that ACR.
#
# Always required:
#   ECHOFYCONTAINER_AZURE_CLIENT_ID / TENANT_ID / SUBSCRIPTION_ID
#
# Container App ingress target port should be 8080 (see Dockerfile).

name: Trigger auto deployment for echofy-container

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker/**'
      - '.github/workflows/echofy-container-AutoDeployTrigger-a8b4f73f-e54d-4628-9cb6-432086c7002a.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ECHOFYCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ECHOFYCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ECHOFYCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Prepare registry settings
        id: prep
        env:
          ACR_NAME: ${{ secrets.ECHOFYCONTAINER_ACR_NAME }}
          REGISTRY_URL: ${{ secrets.ECHOFYCONTAINER_REGISTRY_URL }}
        run: |
          set -e
          URL_RAW="${REGISTRY_URL:-}"
          URL_RAW="${URL_RAW#https://}"
          URL_RAW="${URL_RAW#http://}"
          URL_RAW="${URL_RAW%/}"
          if [ -n "$URL_RAW" ]; then
            echo "mode=registry" >> "$GITHUB_OUTPUT"
            echo "registry_url=$URL_RAW" >> "$GITHUB_OUTPUT"
            echo "image=$URL_RAW/echofy:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          elif [ -n "$ACR_NAME" ]; then
            echo "mode=acr" >> "$GITHUB_OUTPUT"
            echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
            echo "image=${ACR_NAME}.azurecr.io/echofy:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Set ECHOFYCONTAINER_REGISTRY_URL (e.g. myregistry.azurecr.io) plus USERNAME/PASSWORD, OR set ECHOFYCONTAINER_ACR_NAME for OIDC-only ACR push."
            exit 1
          fi

      - name: Build and deploy (ACR + OIDC)
        if: steps.prep.outputs.mode == 'acr'
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          acrName: ${{ steps.prep.outputs.acr_name }}
          containerAppName: echofy-container
          resourceGroup: Echofy
          imageToBuild: ${{ steps.prep.outputs.image }}
          targetPort: 8080

      - name: Build and deploy (registry login)
        if: steps.prep.outputs.mode == 'registry'
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: ${{ steps.prep.outputs.registry_url }}
          registryUsername: ${{ secrets.ECHOFYCONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ECHOFYCONTAINER_REGISTRY_PASSWORD }}
          containerAppName: echofy-container
          resourceGroup: Echofy
          imageToBuild: ${{ steps.prep.outputs.image }}
          targetPort: 8080
