name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false
      - name: Write echofy-config.json for browser API base URL
        env:
          ECHOFY_BACKEND_URL: ${{ secrets.ECHOFY_BACKEND_URL }}
        run: |
          python3 -c "
          import json, os, pathlib
          base = (os.environ.get('ECHOFY_BACKEND_URL') or '').strip().rstrip('/')
          pathlib.Path('frontend/public/echofy-config.json').write_text(
              json.dumps({'apiBase': base}, separators=(',', ':')),
              encoding='utf-8',
          )
          "
      - name: Render static HTML from snippets
        run: python scripts/render_static_html.py
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_MUD_0E527350F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "frontend/public" # Static site (HTML/CSS/JS)
          api_location: "" # Set to "api" when Azure Functions are added
          output_location: "" # No build step; deploy frontend/public as-is
          skip_app_build: true # No package.json; skip Oryx platform detection
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_MUD_0E527350F }}
          action: "close"
