  <!-- LOGIN FORM -->
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to pick up where you left off.</p>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn-primary auth-submit" id="btn-login">Sign In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup" class="auth-link">Create one</a></p>
    </div>
  </div>
