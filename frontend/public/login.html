<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Echofy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="index.html">Echo<span>fy</span></a>
    <ul class="nav-links">
      <li><a href="discover.html">Discover</a></li>
      <li><a href="#">Friends</a></li>
      <li><a href="#">Your Echo</a></li>
      <li><a href="login.html" class="nav-cta is-active">Sign In</a></li>
    </ul>
  </nav>

  <!-- LOGIN FORM -->
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to pick up where you left off.</p>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn-primary auth-submit" id="btn-login">Sign In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html" class="auth-link">Create one</a></p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2026 Echofy — INST347 Group 5</span>
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">GitHub</a>
    </div>
  </footer>

  <script src="js/auth.js" defer></script>
</body>
</html>
